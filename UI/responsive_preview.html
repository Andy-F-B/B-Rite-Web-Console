<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>B-Rite Console — Responsive Preview</title>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0a0a0a;
      --surface: #141414;
      --border: #262626;
      --text: #e5e5e5;
      --muted: #737373;
      --accent: #22c55e;
      --font: 'JetBrains Mono', monospace;
    }
    * { box-sizing: border-box; }
    body { margin: 0; font-family: var(--font); background: var(--bg); color: var(--text); padding: 24px; }
    h1 { font-size: 1.25rem; margin: 0 0 16px; }
    .frames { display: flex; gap: 24px; flex-wrap: wrap; justify-content: center; }
    .frame { background: var(--surface); border: 1px solid var(--border); border-radius: 4px; overflow: hidden; }
    .frame-header { background: var(--accent); color: var(--bg); padding: 8px 16px; font-size: 12px; font-weight: 500; }
    .frame iframe { display: block; border: none; }
  </style>
</head>
<body>
  <h1>B-Rite Console — Multi-Device Preview</h1>
  <p style="color: var(--muted); margin-bottom: 24px;">390px · 768px · 1280px · 1440px</p>

  <div class="frames">
    <div class="frame">
      <div class="frame-header">390px (mobile)</div>
      <iframe src="about:blank" width="390" height="700" title="Mobile"></iframe>
    </div>
    <div class="frame">
      <div class="frame-header">768px (tablet)</div>
      <iframe src="about:blank" width="768" height="700" title="Tablet"></iframe>
    </div>
    <div class="frame">
      <div class="frame-header">1280px (laptop)</div>
      <iframe src="about:blank" width="1280" height="700" title="Laptop"></iframe>
    </div>
    <div class="frame">
      <div class="frame-header">1440px (desktop)</div>
      <iframe src="about:blank" width="1440" height="700" title="Desktop"></iframe>
    </div>
  </div>

  <script>
    const html = `<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet"><style>*{box-sizing:border-box}body{margin:0;font-family:'JetBrains Mono',monospace;background:#0a0a0a;color:#e5e5e5;padding:24px}nav{display:flex;flex-wrap:wrap;gap:12px;margin-bottom:24px;padding:12px;background:#141414;border:1px solid #262626;border-radius:4px}nav a{color:#e5e5e5;text-decoration:none;font-size:14px}nav a:hover{color:#22c55e}h1{font-size:1.5rem;margin:0 0 16px}p{color:#737373;margin:0 0 16px;font-size:14px;line-height:1.6}.cta{display:flex;flex-wrap:wrap;gap:12px;margin-top:24px}.cta a{padding:12px 24px;border-radius:4px;text-decoration:none;font-weight:500;font-size:14px}.cta .primary{background:#22c55e;color:#0a0a0a}.cta .secondary{border:1px solid #262626;color:#e5e5e5}</style></head><body><nav><a href="/">B-Rite Console</a><a href="/console">Editor</a><a href="/downloads">Downloads</a><a href="/saved">Saved</a><a href="/privacy">Privacy</a><a href="/login">Sign in</a><a href="/signup">Sign up</a></nav><main><h1>B-Rite Console</h1><p>Write, validate, and manage b-rite scripts. Auto-formatting, syntax highlighting, and downloads.</p><div class="cta"><a href="/console" class="primary">Open Editor</a><a href="/downloads" class="secondary">Downloads</a><a href="/saved" class="secondary">Saved</a></div></main></body></html>`;
    document.querySelectorAll('.frame iframe').forEach((iframe) => {
      iframe.srcdoc = html;
    });
  </script>
</body>
</html>
